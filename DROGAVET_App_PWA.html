<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DROGAVET">
<meta name="theme-color" content="#0A3D2B">
<title>DROGAVET Campo</title>
<style>
:root{
  --g0:#0A3D2B;--g1:#0F6E56;--g2:#1D9E75;--g4:#9FE1CB;--g5:#E1F5EE;
  --ink:#0D1F17;--ink2:#2C3D35;--ink3:#5A7066;--ink4:#8FA89F;
  --sf:#F4FAF7;--card:#FFF;--bd:#D4EAE0;
  --red:#E24B4A;--redl:#FCEBEB;
  --amb:#EF9F27;--ambl:#FAEEDA;
  --blu:#185FA5;--blul:#E6F1FB;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bot:env(safe-area-inset-bottom,34px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;height:-webkit-fill-available}
body{
  height:100%;height:-webkit-fill-available;
  background:var(--sf);
  font-family:-apple-system,system-ui,sans-serif;
  color:var(--ink);
  overflow:hidden;
  position:fixed;width:100%;
}
#app{
  display:flex;flex-direction:column;
  height:100%;height:-webkit-fill-available;
  max-width:430px;margin:0 auto;
  background:var(--sf);
  position:relative;
}
.safe-top{height:var(--safe-top);background:var(--g0);flex-shrink:0}
.hdr{
  background:var(--g0);
  padding:10px 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.hdr-brand{display:flex;align-items:center;gap:9px}
.hdr-logo{
  width:34px;height:34px;
  background:var(--g2);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.hdr-title{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.3px}
.hdr-sub{font-size:10px;color:var(--g4);margin-top:1px}
.hdr-date{font-size:10px;color:var(--g4)}
.scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(64px + var(--safe-bot))}
.pg{display:none;padding:14px 14px 0}.pg.on{display:block}
.nav{
  position:absolute;bottom:0;left:0;right:0;
  background:#fff;
  border-top:1px solid var(--bd);
  padding-bottom:var(--safe-bot);
  display:flex;z-index:100;
}
.ni{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 2px 4px;gap:2px;cursor:pointer;
  color:var(--ink4);position:relative;
}
.ni.on{color:var(--g1)}
.ni svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni-lbl{font-size:9.5px;font-weight:500}
.badge{
  position:absolute;top:4px;right:calc(50% - 20px);
  background:var(--red);color:#fff;
  font-size:8px;font-weight:700;
  padding:1px 4px;border-radius:8px;
  min-width:16px;text-align:center;
  display:none;
}
.fab{
  position:absolute;
  bottom:calc(58px + var(--safe-bot));
  right:16px;
  width:52px;height:52px;
  background:var(--g1);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:26px;
  box-shadow:0 4px 16px rgba(15,110,86,.4);
  cursor:pointer;border:none;z-index:99;
}
.card{
  background:var(--card);
  border-radius:14px;border:1px solid var(--bd);
  padding:13px;margin-bottom:9px;
  box-shadow:0 2px 8px rgba(10,61,43,.07);
}
.kpi-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--card);border-radius:8px;border:1px solid var(--bd);padding:11px;text-align:center}
.kv{font-size:22px;font-weight:600;color:var(--g1)}
.kl{font-size:9.5px;color:var(--ink4);margin-top:2px}
.kpi.red .kv{color:var(--red)}.kpi.amb .kv{color:#854F0B}.kpi.blu .kv{color:var(--blu)}
.li{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.li:last-child{border-bottom:none}
.av{
  width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex-shrink:0;
}
.lb{flex:1;min-width:0}
.ln{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ls{font-size:11px;color:var(--ink3);margin-top:2px}
.lr{color:var(--ink4)}
.tag{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px;margin-right:3px}
.t-g{background:var(--g5);color:var(--g1)}
.t-r{background:var(--redl);color:var(--red)}
.t-a{background:var(--ambl);color:#854F0B}
.t-b{background:var(--blul);color:var(--blu)}
.t-p{background:#EEEDFE;color:#534AB7}
.t-gr{background:#F0F0F0;color:#555}
.sec{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink4);margin:14px 0 8px}
.btn{width:100%;padding:13px;border-radius:14px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-p{background:var(--g1);color:#fff}
.btn-s{background:var(--g5);color:var(--g1);margin-top:8px}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px;width:auto;display:inline-block;font-weight:600;cursor:pointer;border:none;font-family:inherit;margin-right:6px}
.btn-r{background:var(--redl);color:var(--red);margin-top:8px}
.st-r{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.st{background:var(--g5);border-radius:8px;padding:8px 4px;text-align:center}
.st-v{font-size:15px;font-weight:600;color:var(--g1)}
.st-l{font-size:9px;color:var(--ink3);margin-top:2px}
.back-btn{
  display:flex;align-items:center;gap:6px;
  color:var(--g1);font-size:13px;font-weight:500;
  margin-bottom:12px;cursor:pointer;
  background:none;border:none;padding:4px 0;font-family:inherit;
}
.wpp-btn{
  background:#25D366;color:#fff;border:none;
  border-radius:8px;padding:8px 14px;
  font-size:12px;font-weight:600;cursor:pointer;
  margin-top:8px;font-family:inherit;
}
.ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);
  z-index:200;align-items:flex-end;justify-content:center;
}
.ov.open{display:flex}
.md{
  background:#fff;border-radius:24px 24px 0 0;
  padding:0 16px calc(24px + var(--safe-bot));
  width:100%;max-width:430px;
  max-height:90vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.md-h{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 16px}
.md-t{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:16px}
.fl{display:flex;flex-direction:column;gap:12px}
.fl-r{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lbl{font-size:11px;font-weight:600;color:var(--ink3);display:block;margin-bottom:4px}
.inp{
  width:100%;padding:10px 12px;
  border-radius:8px;border:1.5px solid var(--bd);
  font-size:15px;color:var(--ink);background:#fff;
  -webkit-appearance:none;font-family:inherit;
}
.inp:focus{outline:none;border-color:var(--g2);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
select.inp{background:#fff}
textarea.inp{min-height:64px;resize:none}
.alert-item{border-radius:8px;padding:11px 13px;margin-bottom:7px;border-left:3px solid}
.alert-item.urg{border-color:var(--red);background:var(--redl)}
.alert-item.hj{border-color:var(--amb);background:var(--ambl)}
.alert-item.px{border-color:var(--g2);background:var(--g5)}
.dose-row{padding:7px 0;border-bottom:1px solid var(--bd);font-size:12px}
.dose-row:last-child{border-bottom:none}
#toast{
  position:fixed;bottom:calc(80px + var(--safe-bot));
  left:50%;transform:translateX(-50%) translateY(20px);
  background:#1A2E20;color:#fff;
  padding:9px 20px;border-radius:20px;
  font-size:13px;opacity:0;
  transition:all .25s;z-index:300;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:36px 20px;color:var(--ink4)}
.empty .ei{font-size:36px;margin-bottom:10px}
.empty .et{font-size:14px;font-weight:500;color:var(--ink2);margin-bottom:4px}
.install-banner{
  background:var(--g0);color:#fff;
  padding:12px 16px;
  font-size:12px;line-height:1.6;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
.install-close{
  background:none;border:none;color:var(--g4);
  font-size:18px;cursor:pointer;padding:0;margin-left:auto;
}
</style>
</head>
<body>
<div id="app">
  <div class="safe-top"></div>

  <!-- BANNER INSTRUÇÃO INSTALAR -->
  <div class="install-banner" id="install-banner">
    <div>📲 <b>Adicione à Tela Inicial:</b> Toque em <b>Compartilhar ⬆️</b> → <b>"Adicionar à Tela de Início"</b></div>
    <button class="install-close" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
  </div>

  <div class="hdr">
    <div class="hdr-brand">
      <div class="hdr-logo">🐴</div>
      <div>
        <div class="hdr-title">DROGAVET Campo</div>
        <div class="hdr-sub" id="hdr-sub">CRM Equinos</div>
      </div>
    </div>
    <div class="hdr-date" id="hdr-date"></div>
  </div>

  <div class="scr">
    <div class="pg on" id="pg-home"></div>
    <div class="pg" id="pg-alertas"></div>
    <div class="pg" id="pg-clientes"></div>
    <div class="pg" id="pg-visitas"></div>
    <div class="pg" id="pg-dose"></div>
  </div>

  <div class="nav">
    <div class="ni on" id="ni-home" onclick="goTo('home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="ni-lbl">Início</span>
    </div>
    <div class="ni" id="ni-alertas" onclick="goTo('alertas')">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <div class="badge" id="badge">0</div>
      <span class="ni-lbl">Alertas</span>
    </div>
    <div class="ni" id="ni-clientes" onclick="goTo('clientes')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span class="ni-lbl">Clientes</span>
    </div>
    <div class="ni" id="ni-visitas" onclick="goTo('visitas')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
      <span class="ni-lbl">Visitas</span>
    </div>
    <div class="ni" id="ni-dose" onclick="goTo('dose')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span class="ni-lbl">Doses</span>
    </div>
  </div>

  <button class="fab" id="fab" onclick="fabAction()">+</button>
</div>

<!-- MODAIS -->
<div class="ov" id="md-cli" onclick="closeMdOut(event,'md-cli')">
  <div class="md"><div class="md-h"></div><div class="md-t">Novo cliente</div>
    <div class="fl">
      <div><label class="lbl">Nome / Haras *</label><input class="inp" id="c-nm" placeholder="Ex: Haras Boa Vista"></div>
      <div class="fl-r">
        <div><label class="lbl">Responsável</label><input class="inp" id="c-rsp" placeholder="Nome"></div>
        <div><label class="lbl">WhatsApp</label><input class="inp" id="c-tel" placeholder="(44) 99999" type="tel"></div>
      </div>
      <div class="fl-r">
        <div><label class="lbl">Cidade</label><select class="inp" id="c-cid"><option>Maringá</option><option>Pres. Prudente</option><option>Outra</option></select></div>
        <div><label class="lbl">Atividade</label><select class="inp" id="c-atv"><option>Vaquejada / Laço</option><option>Reprodução / Cria</option><option>Alta performance</option><option>Geral</option></select></div>
      </div>
      <div class="fl-r">
        <div><label class="lbl">Segmento</label><select class="inp" id="c-seg"><option value="ouro">Ouro</option><option value="alto" selected>Alto valor</option><option value="recorrente">Recorrente</option><option value="potencial">Potencial</option></select></div>
        <div><label class="lbl">Veterinário</label><input class="inp" id="c-vet" placeholder="Dr./Dra."></div>
      </div>
      <div><label class="lbl">Observações</label><textarea class="inp" id="c-obs" placeholder="Histórico, contexto…"></textarea></div>
      <button class="btn btn-p" onclick="saveCli()">Salvar cliente</button>
      <button class="btn btn-s" onclick="closeMd('md-cli')">Cancelar</button>
    </div>
  </div>
</div>

<div class="ov" id="md-an" onclick="closeMdOut(event,'md-an')">
  <div class="md"><div class="md-h"></div><div class="md-t">Cadastrar animal</div>
    <div class="fl">
      <div><label class="lbl">Nome *</label><input class="inp" id="a-nm" placeholder="Ex: Trovão…"></div>
      <div class="fl-r">
        <div><label class="lbl">Raça</label><input class="inp" id="a-rca" placeholder="QM, Mangalarga…"></div>
        <div><label class="lbl">Peso (kg)</label><input class="inp" id="a-pso" type="number" placeholder="450"></div>
      </div>
      <div class="fl-r">
        <div><label class="lbl">Sexo</label><select class="inp" id="a-sx"><option>Macho</option><option>Fêmea</option><option>Castrado</option></select></div>
        <div><label class="lbl">Idade (anos)</label><input class="inp" id="a-id" type="number" placeholder="5"></div>
      </div>
      <div><label class="lbl">Produto principal</label>
        <select class="inp" id="a-prod">
          <option value="">— sem reposição —</option>
          <option value="Omeprazol tratamento|28|5">Omeprazol tratamento (28d)</option>
          <option value="Omeprazol manutenção|30|5">Omeprazol manutenção (30d)</option>
          <option value="Biotina injetável|14|3">Biotina injetável (14d)</option>
          <option value="Ivermectina pasta|60|7">Ivermectina pasta (60d)</option>
          <option value="Moxidectina pasta|60|7">Moxidectina pasta (60d)</option>
          <option value="Firocoxibe|30|5">Firocoxibe (30d)</option>
          <option value="Levotiroxina|30|5">Levotiroxina (30d)</option>
          <option value="Progesterona injetável|7|2">Progesterona injetável (7d)</option>
          <option value="Altrenogeste oral|30|5">Altrenogeste oral (30d)</option>
          <option value="OrthoEq Grow|30|5">OrthoEq Grow (30d)</option>
          <option value="OrthoEq Performance|30|5">OrthoEq Performance (30d)</option>
          <option value="PerformEq Prep|30|5">PerformEq Prep (30d)</option>
          <option value="PerformEq Race|1|1">PerformEq Race (por evento)</option>
          <option value="PerformEq Recover|30|5">PerformEq Recover (30d)</option>
          <option value="MuscleEq Adulto|30|5">MuscleEq Adulto (30d)</option>
          <option value="MuscleEq Potro|30|5">MuscleEq Potro (30d)</option>
          <option value="MuscleEq Égua|30|5">MuscleEq Égua (30d)</option>
          <option value="MetabEq Equilíbrio|30|5">MetabEq Equilíbrio (30d)</option>
          <option value="RespEq|30|5">RespEq (30d)</option>
          <option value="GastroEq Ativo|28|5">GastroEq Ativo (28d)</option>
          <option value="GastroEq Manutenção|30|5">GastroEq Manutenção (30d)</option>
          <option value="ReproEq Égua|30|5">ReproEq Égua (30d)</option>
          <option value="ReproEq Garanhão|30|5">ReproEq Garanhão (30d)</option>
          <option value="TopEq Tendão|30|5">TopEq Tendão (30d)</option>
          <option value="TopEq Poultice|30|5">TopEq Poultice (30d)</option>
        </select>
      </div>
      <div><label class="lbl">Última dose (para alerta)</label><input class="inp" id="a-ult" type="date"></div>
      <div><label class="lbl">Observações clínicas</label><textarea class="inp" id="a-obs" placeholder="Histórico, alergias, vet responsável…"></textarea></div>
      <button class="btn btn-p" onclick="saveAn()">Salvar animal</button>
      <button class="btn btn-s" onclick="closeMd('md-an')">Cancelar</button>
    </div>
  </div>
</div>

<div class="ov" id="md-vis" onclick="closeMdOut(event,'md-vis')">
  <div class="md"><div class="md-h"></div><div class="md-t">Registrar visita</div>
    <div class="fl">
      <div><label class="lbl">Cliente *</label><select class="inp" id="v-cl"><option value="">— selecione —</option></select></div>
      <div class="fl-r">
        <div><label class="lbl">Data</label><input class="inp" id="v-dt" type="date"></div>
        <div><label class="lbl">Perfil</label><select class="inp" id="v-pf"><option>Dono</option><option>Treinador</option><option>Gerente</option><option>Veterinário</option><option>Tratador</option></select></div>
      </div>
      <div><label class="lbl">Produtos apresentados</label><input class="inp" id="v-pr" placeholder="Ex: OrthoEq, GastroEq…"></div>
      <div><label class="lbl">Resultado</label><select class="inp" id="v-st"><option>Fechado</option><option>Proposta enviada</option><option>Retorno agendado</option><option>Interessado</option><option>Sem interesse</option></select></div>
      <div class="fl-r">
        <div><label class="lbl">Valor (R$)</label><input class="inp" id="v-vl" type="number" value="0" step="50"></div>
        <div><label class="lbl">Próxima ação</label><input class="inp" id="v-nx" placeholder="Ex: Ligar em 7d"></div>
      </div>
      <div><label class="lbl">Notas</label><textarea class="inp" id="v-nt" placeholder="Contexto, observações…"></textarea></div>
      <button class="btn btn-p" onclick="saveVis()">Salvar visita</button>
      <button class="btn btn-s" onclick="closeMd('md-vis')">Cancelar</button>
    </div>
  </div>
</div>

<div class="ov" id="md-buy" onclick="closeMdOut(event,'md-buy')">
  <div class="md"><div class="md-h"></div><div class="md-t">Registrar compra</div>
    <div class="fl">
      <div><label class="lbl">Cliente *</label><select class="inp" id="b-cl"><option value="">— selecione —</option></select></div>
      <div class="fl-r">
        <div><label class="lbl">Data</label><input class="inp" id="b-dt" type="date"></div>
        <div><label class="lbl">Valor (R$)</label><input class="inp" id="b-vl" type="number" value="0" step="50"></div>
      </div>
      <div><label class="lbl">Produtos *</label><input class="inp" id="b-pr" placeholder="Ex: OrthoEq Performance 500g…"></div>
      <div><label class="lbl">Observações</label><input class="inp" id="b-ob" placeholder="Vet, prescrição…"></div>
      <button class="btn btn-p" onclick="saveBuy()">Salvar compra</button>
      <button class="btn btn-s" onclick="closeMd('md-buy')">Cancelar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STORAGE (localStorage — funciona quando adicionado à tela inicial) ──
var KEY='drv4';
var DB={clientes:[],animais:[],visitas:[],compras:[]};
function load(){try{var s=localStorage.getItem(KEY);if(s)DB=Object.assign({clientes:[],animais:[],visitas:[],compras:[]},JSON.parse(s))}catch(e){}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(DB))}catch(e){toast('⚠️ Erro ao salvar — adicione à Tela Inicial')}}
load();

// ── UTILS ──
var CLRS=['#0F6E56','#185FA5','#534AB7','#993C1D','#854F0B','#1D8F6E','#3B6D11'];
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function today(){return new Date().toISOString().split('T')[0]}
function fmt(d){return d?new Date(d+'T12:00:00').toLocaleDateString('pt-BR'):'—'}
function fmtM(v){return'R$'+(v||0).toLocaleString('pt-BR')}
function ini(n){return(n||'?').split(' ').map(function(w){return w[0]}).join('').slice(0,2).toUpperCase()}
function clr(n){return CLRS[Math.abs((n||'').split('').reduce(function(a,c){return a+c.charCodeAt(0)},0))%CLRS.length]}
function dias(u,c){if(!u)return 999;var d=new Date(u+'T12:00:00');d.setDate(d.getDate()+parseInt(c));var n=new Date();n.setHours(0,0,0,0);return Math.round((d-n)/86400000)}
function stA(d,a){if(d<0)return'urg';if(d<=1)return'hj';if(d<=parseInt(a||5))return'px';return'ok'}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){toast('Copiado! Cole no WhatsApp ✓')})}
  else{var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copiado! Cole no WhatsApp ✓')}
}

// ── NAVEGAÇÃO ──
var cur='home',curCli='',curAn='';
function goTo(p){
  document.querySelectorAll('.pg').forEach(function(x){x.classList.remove('on')});
  document.querySelectorAll('.ni').forEach(function(x){x.classList.remove('on')});
  document.getElementById('pg-'+p).classList.add('on');
  document.getElementById('ni-'+p).classList.add('on');
  cur=p;
  if(p!=='clientes'){curCli='';curAn='';}
  renderPg(p);
}
function renderPg(p){
  if(p==='home')renderHome();
  else if(p==='alertas')renderAlerts();
  else if(p==='clientes'){if(curAn)renderAnimal();else if(curCli)renderCli();else renderClis();}
  else if(p==='visitas')renderVis();
  else if(p==='dose')renderDose();
}
function fabAction(){
  if(cur==='clientes')openMd('md-cli');
  else if(cur==='visitas')openMd('md-vis');
  else openMd('md-buy');
}

// ── MODAIS ──
function openMd(id){fillSels();setDates();document.getElementById(id).classList.add('open')}
function closeMd(id){document.getElementById(id).classList.remove('open')}
function closeMdOut(e,id){if(e.target.id===id)closeMd(id)}
function setDates(){['v-dt','b-dt','a-ult'].forEach(function(id){var el=document.getElementById(id);if(el&&!el.value)el.value=today()})}
function fillSels(){
  ['v-cl','b-cl'].forEach(function(id){
    var s=document.getElementById(id);if(!s)return;
    var v=s.value;
    s.innerHTML='<option value="">— selecione —</option>'+DB.clientes.map(function(c){return'<option value="'+c.id+'"'+(v===c.id?' selected':'')+'>'+c.nome+'</option>'}).join('');
  });
  if(curCli){['v-cl','b-cl'].forEach(function(id){var s=document.getElementById(id);if(s&&!s.value)s.value=curCli})}
}

// ── SALVAR ──
function saveCli(){
  var nm=document.getElementById('c-nm').value.trim();if(!nm){toast('Informe o nome');return}
  DB.clientes.push({id:uid(),nome:nm,resp:v('c-rsp'),tel:v('c-tel'),cidade:v('c-cid'),ativ:v('c-atv'),seg:v('c-seg'),vet:v('c-vet'),obs:v('c-obs')});
  save();closeMd('md-cli');toast('Cliente salvo ✓');
  ['c-nm','c-rsp','c-tel','c-vet','c-obs'].forEach(function(id){document.getElementById(id).value=''});
  renderPg(cur);
}
function saveAn(){
  if(!curCli){toast('Abra um cliente primeiro');return}
  var nm=document.getElementById('a-nm').value.trim();if(!nm){toast('Informe o nome do animal');return}
  var pf=v('a-prod'),parts=pf?pf.split('|'):['','30','5'];
  DB.animais.push({id:uid(),cliId:curCli,nome:nm,rca:v('a-rca'),peso:v('a-pso'),sx:v('a-sx'),idade:v('a-id'),prod:parts[0],ciclo:parts[1]||'30',aviso:parts[2]||'5',ultima:v('a-ult'),obs:v('a-obs')});
  save();closeMd('md-an');toast('Animal cadastrado ✓');
  ['a-nm','a-rca','a-pso','a-id','a-obs'].forEach(function(id){document.getElementById(id).value=''});
  renderCli();
}
function saveVis(){
  var cliId=v('v-cl');if(!cliId){toast('Selecione o cliente');return}
  DB.visitas.unshift({id:uid(),cliId:cliId,dt:v('v-dt'),pf:v('v-pf'),pr:v('v-pr'),st:v('v-st'),vl:parseFloat(v('v-vl'))||0,nx:v('v-nx'),nt:v('v-nt')});
  save();closeMd('md-vis');toast('Visita registrada ✓');
  ['v-pr','v-nx','v-nt'].forEach(function(id){document.getElementById(id).value=''});
  document.getElementById('v-vl').value=0;
  renderPg(cur);
}
function saveBuy(){
  var cliId=v('b-cl');if(!cliId){toast('Selecione o cliente');return}
  var pr=document.getElementById('b-pr').value.trim();if(!pr){toast('Informe o produto');return}
  DB.compras.unshift({id:uid(),cliId:cliId,dt:v('b-dt'),vl:parseFloat(v('b-vl'))||0,pr:pr,ob:v('b-ob')});
  save();closeMd('md-buy');toast('Compra registrada ✓');
  ['b-pr','b-ob'].forEach(function(id){document.getElementById(id).value=''});
  document.getElementById('b-vl').value=0;
  renderPg(cur);
}
function v(id){var el=document.getElementById(id);return el?el.value:''}

// ── ALERTAS ──
function getAlerts(){
  return DB.animais.filter(function(a){return a.prod&&a.ultima}).map(function(a){
    var d=dias(a.ultima,a.ciclo);
    var cli=DB.clientes.find(function(c){return c.id===a.cliId});
    return Object.assign({},a,{d:d,st:stA(d,a.aviso),cliNome:cli?cli.nome:'?',tel:cli?cli.tel:''});
  }).filter(function(a){return a.st!=='ok'}).sort(function(x,y){return x.d-y.d});
}
function alertHtml(a){
  var txt=a.d<0?'Vencido '+Math.abs(a.d)+'d':a.d===0?'Hoje!':a.d===1?'Amanhã':'Em '+a.d+'d';
  var tagCls=a.st==='urg'?'t-r':a.st==='hj'?'t-a':'t-g';
  var wpp='Olá '+a.cliNome+'! 🐴 Lembrete: '+a.nome+' precisa repor *'+a.prod+'* ('+txt.toLowerCase()+'). Posso preparar o pedido? — DROGAVET';
  return'<div class="alert-item '+a.st+'">'+
    '<div style="display:flex;align-items:center;justify-content:space-between">'+
    '<div style="font-size:12px;font-weight:600">'+a.nome+' · '+a.cliNome+'</div>'+
    '<span class="tag '+tagCls+'">'+txt+'</span></div>'+
    '<div class="ls">'+a.prod+'</div>'+
    (a.tel?'<button class="wpp-btn" onclick="copyText(`'+wpp.replace(/`/g,'\\`')+'`)">📱 Copiar WhatsApp</button>':'')+
    '</div>';
}
function updateBadge(){
  var n=getAlerts().filter(function(a){return a.d<0||a.d<=1}).length;
  var b=document.getElementById('badge');
  b.textContent=n;b.style.display=n>0?'block':'none';
}

  var now=new Date(),m=now.getMonth(),y=now.getFullYear();
  var fat=DB.compras.filter(function(b){var d=new Date(b.dt);return d.getMonth()===m&&d.getFullYear()===y}).reduce(function(s,b){return s+b.vl},0);

  var alts=getAlerts();
  var urg=alts.filter(function(a){return a.d<0||a.d<=1}).length;

  document.getElementById('pg-home').innerHTML=
    '<div class="kpi-g">'+
    '<div class="kpi"><div class="kv">'+DB.clientes.length+'</div><div class="kl">Clientes</div></div>'+
    '<div class="kpi red"><div class="kv">'+urg+'</div><div class="kl">Alertas urgentes</div></div>'+
    '<div class="kpi blu"><div class="kv">'+(fat>0?'R$'+Math.round(fat/1000)+'k':'R$0')+'</div><div class="kl">Faturamento mês</div></div>'+

    '</div>'+

    '<div class="sec">Últimas visitas</div>'+

      var cli=DB.clientes.find(function(c){return c.id===vis.cliId});

      var stCls={Fechado:'t-g','Proposta enviada':'t-b','Retorno agendado':'t-p','Interessado':'t-a','Sem interesse':'t-gr'}[vis.st]||'t-gr';
      return'<div class="li"><div class="av" style="background:'+bg+'20;color:'+bg+'">'+ini(cli?cli.nome:'?')+'</div>'+

  var alts=getAlerts();

function renderDose(){
  document.getElementById('pg-dose').innerHTML=
    '<div class="sec">Calculadora de doses</div>'+
    '<div class="card">'+
    '<div class="fl">'+
    '<div><label class="lbl">Produto / Linha</label>'+
    '<select class="inp" id="dose-prod" onchange="calcDose()">'+
    '<option value="">— selecione —</option>'+
    '<optgroup label="🦴 OrthoEq Articular">'+
    Object.keys(DOSES).filter(function(k){return k.startsWith('OrthoEq')}).map(function(k){return'<option>'+k+'</option>'}).join('')+
    '</optgroup><optgroup label="🏆 PerformEq">'+
    Object.keys(DOSES).filter(function(k){return k.startsWith('PerformEq')}).map(function(k){return'<option>'+k+'</option>'}).join('')+
    '</optgroup><optgroup label="💪 MuscleEq">'+
    Object.keys(DOSES).filter(function(k){return k.startsWith('MuscleEq')}).map(function(k){return'<option>'+k+'</option>'}).join('')+
    '</optgroup><optgroup label="Outras linhas">'+
    ['MetabEq Equilíbrio','RespEq','GastroEq Ativo','GastroEq Manutenção','ReproEq Égua','ReproEq Garanhão'].map(function(k){return'<option>'+k+'</option>'}).join('')+
    '</optgroup></select></div>'+
    '<div><label class="lbl">Peso do animal (kg)</label>'+
    '<input class="inp" id="dose-peso" type="number" placeholder="450" min="50" max="800" oninput="calcDose()" value="450"></div>'+
    '</div></div>'+
    '<div id="dose-result"></div>';
}
function calcDose(){
  var prod=document.getElementById('dose-prod').value;
  var peso=parseFloat(document.getElementById('dose-peso').value)||450;
  var el=document.getElementById('dose-result');if(!el)return;
  if(!prod){el.innerHTML='';return}
  var d=DOSES[prod];if(!d){el.innerHTML='';return}
  el.innerHTML='<div class="card">'+
    '<div style="font-size:14px;font-weight:600;margin-bottom:6px">'+prod+'</div>'+
    '<div style="margin-bottom:10px">'+
    '<span class="tag t-g" style="font-size:10px">'+d.f+'</span>'+
    '<span class="tag t-g" style="font-size:10px">R$'+d.p+'/mês</span>'+
    '</div>'+
    d.a.map(function(a,i){
      return'<div class="dose-row" style="border-bottom:'+(i<d.a.length-1?'1px solid var(--bd)':'none')+'">'+
        '<b>'+a.n+'</b><br>'+
        '<span style="color:var(--g1);font-weight:600">'+a.d(peso)+'</span>'+
        (a.o?' <span style="color:var(--ink4)">· '+a.o+'</span>':'')+
        '</div>';
    }).join('')+
    '<div style="margin-top:8px;font-size:11px;color:var(--ink4)">* Para animal de '+peso+'kg</div>'+
    '</div>';
}
